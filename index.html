<!-- Physics world -->
<div id="world"></div>

<script>
(() => {
  const {
    Engine, Render, Runner, Bodies, Body, Composite,
    Mouse, MouseConstraint, Events
  } = Matter;

  const container = document.getElementById('world');
  const footerEl = document.getElementById('footer-section');
  
  const W = () => window.innerWidth;
  const H = () => window.innerHeight;
  const getGroundY = () => H() - footerEl.offsetHeight;

  const isMobile = () => window.innerWidth < 768;
  const SHAPE_SIZE = () => isMobile() ? 106 : 232;

  const engine = Engine.create();
  engine.gravity.y = 1.1;
  const world = engine.world;

  const render = Render.create({
    element: container,
    engine: engine,
    options: {
      width: W(),
      height: H(),
      wireframes: false,
      background: 'transparent',
      pixelRatio: window.devicePixelRatio || 1,
    }
  });
  render.canvas.style.opacity = '0';
  Render.run(render);

  const runner = Runner.create();
  Runner.run(runner, engine);

  const wallOpts = { isStatic: true, render: { visible: false }, restitution: 0.6, friction: 0.4 };
  
  let ground = Bodies.rectangle(W()/2, getGroundY(), W(), 20, wallOpts);
  let leftWall = Bodies.rectangle(0, H()/2, 20, H(), wallOpts);
  let rightWall = Bodies.rectangle(W(), H()/2, 20, H(), wallOpts);
  let ceiling = Bodies.rectangle(W()/2, 0, W(), 20, wallOpts);
  
  Composite.add(world, [ground, leftWall, rightWall, ceiling]);

  // Google Labs vibrant / playful color palette
  const palette = [
    { bg: '#A8DADC', fg: '#181818' },
    { bg: '#FFC8DD', fg: '#181818' },
    { bg: '#CDB4DB', fg: '#181818' },
    { bg: '#B5EAD7', fg: '#181818' },
    { bg: '#FFDAC1', fg: '#181818' },
    { bg: '#FFB7B2', fg: '#181818' },
    { bg: '#A2D2FF', fg: '#181818' },
    { bg: '#E0BBE4', fg: '#181818' },
    { bg: '#C7DCA7', fg: '#181818' },
    { bg: '#F3C5A5', fg: '#181818' }
  ];

  const kindSequence = ['flower','circle','squircle','star','blob','hex','cross','circle','flower','star'];
  const letters = ['C','O','M','I','N','G','S','O','O','N'];

  function verticesFor(kind, size) {
    const r = size / 2;
    const cx = 0, cy = 0;
    switch (kind) {
      case 'flower': {
        const pts = [];
        const petals = 4;
        const steps = 64;
        for (let i = 0; i < steps; i++) {
          const t = (i / steps) * Math.PI * 2;
          const rad = r * (0.62 + 0.38 * Math.abs(Math.cos(petals * t / 2)));
          pts.push({ x: cx + Math.cos(t) * rad, y: cy + Math.sin(t) * rad });
        }
        return pts;
      }
      case 'star': {
        const pts = [];
        const spikes = 5;
        const outer = r;
        const inner = r * 0.5;
        for (let i = 0; i < spikes * 2; i++) {
          const rad = i % 2 === 0 ? outer : inner;
          const t = (i / (spikes * 2)) * Math.PI * 2 - Math.PI / 2;
          pts.push({ x: Math.cos(t) * rad, y: Math.sin(t) * rad });
        }
        return pts;
      }
      case 'blob': {
        const pts = [];
        const steps = 48;
        const seed = Math.random() * 1000;
        for (let i = 0; i < steps; i++) {
          const t = (i / steps) * Math.PI * 2;
          const noise = 0.82 + 0.18 * Math.sin(t * 3 + seed) + 0.06 * Math.cos(t * 5 + seed);
          pts.push({ x: Math.cos(t) * r * noise, y: Math.sin(t) * r * noise });
        }
        return pts;
      }
      case 'hex': {
        const pts = [];
        const sides = 8;
        for (let i = 0; i < sides; i++) {
          const t = (i / sides) * Math.PI * 2 + Math.PI / 8;
          pts.push({ x: Math.cos(t) * r, y: Math.sin(t) * r });
        }
        return pts;
      }
      case 'cross': {
        const a = r * 0.42;
        const b = r * 0.98;
        return [
          {x:-a,y:-b},{x:a,y:-b},{x:a,y:-a},{x:b,y:-a},
          {x:b,y:a},{x:a,y:a},{x:a,y:b},{x:-a,y:b},
          {x:-a,y:a},{x:-b,y:a},{x:-b,y:-a},{x:-a,y:-a}
        ];
      }
      case 'squircle': {
        const pts = [];
        const steps = 40;
        for (let i = 0; i < steps; i++) {
          const t = (i / steps) * Math.PI * 2;
          const cos = Math.cos(t), sin = Math.sin(t);
          const denom = Math.pow(Math.pow(Math.abs(cos),4) + Math.pow(Math.abs(sin),4), 1/4);
          pts.push({ x: (cos / denom) * r, y: (sin / denom) * r });
        }
        return pts;
      }
      default: return null;
    }
  }

  function clipPathFor(kind, size) {
    if (kind === 'circle') return 'circle(50% at 50% 50%)';
    if (kind === 'squircle') return null;
    const verts = verticesFor(kind, size);
    if (!verts) return null;
    const pts = verts.map(v => `${((v.x + size/2)/size*100).toFixed(2)}% ${((v.y + size/2)/size*100).toFixed(2)}%`);
    return `polygon(${pts.join(', ')})`;
  }

  const shapes = [];

  function layoutInitialPositions(count) {
    const size = SHAPE_SIZE();
    const gap = size * 0.12;
    const maxPerRow = Math.max(1, Math.floor((W() - gap) / (size + gap)));
    const positions = [];
    for (let i = 0; i < count; i++) {
      const row = Math.floor(i / maxPerRow);
      const col = i % maxPerRow;
      const rowCount = Math.min(maxPerRow, count - row * maxPerRow);
      const rowWidth = rowCount * size + (rowCount - 1) * gap;
      const startX = (W() - rowWidth) / 2;
      const x = startX + col * (size + gap) + size / 2;
      const y = size/2 + gap + row * (size + gap) + 10;
      positions.push({ x, y });
    }
    return positions;
  }

  function createShape(index, letter, kind, color) {
    const size = SHAPE_SIZE();
    let body;
    const bodyOpts = {
      restitution: 0.55,
      friction: 0.15,
      frictionAir: 0.012,
      density: 0.0018,
      isStatic: true,
      render: { visible: false }
    };

    if (kind === 'circle') {
      body = Bodies.circle(0, 0, size/2, bodyOpts);
    } else if (kind === 'squircle') {
      body = Bodies.rectangle(0, 0, size*0.95, size*0.95, { ...bodyOpts, chamfer: { radius: size*0.28 } });
    } else {
      const verts = verticesFor(kind, size);
      body = Bodies.fromVertices(0, 0, [verts], bodyOpts, true);
      if (!body) body = Bodies.circle(0, 0, size/2, bodyOpts);
    }

    const el = document.createElement('div');
    el.className = 'shape-el';
    el.style.width = size + 'px';
    el.style.height = size + 'px';
    el.style.backgroundColor = color.bg;
    if (kind === 'circle') {
      el.style.borderRadius = '50%';
    } else if (kind === 'squircle') {
      el.style.borderRadius = (size * 0.28) + 'px';
    } else {
      const cp = clipPathFor(kind, size);
      if (cp) { el.style.clipPath = cp; el.style.webkitClipPath = cp; }
    }

    const letterEl = document.createElement('span');
    letterEl.className = 'letter';
    letterEl.textContent = letter;
    letterEl.style.color = color.fg;
    letterEl.style.fontSize = (size * (isMobile() ? 0.44 : 0.38)) + 'px';
    el.appendChild(letterEl);

    document.body.appendChild(el);
    Composite.add(world, body);

    return { body, el, size, kind, color, letter, released: false };
  }

  const positions = layoutInitialPositions(letters.length);

  for (let i = 0; i < letters.length; i++) {
    const s = createShape(i, letters[i], kindSequence[i % kindSequence.length], palette[i % palette.length]);
    const p = positions[i];
    Body.setPosition(s.body, { x: p.x, y: p.y });
    Body.setAngle(s.body, (Math.random() - 0.5) * 0.15);
    shapes.push(s);
  }

  const mouse = Mouse.create(render.canvas);
  const mouseConstraint = MouseConstraint.create(engine, {
    mouse: mouse,
    constraint: {
      stiffness: 0.2,
      damping: 0.1,
      render: { visible: false }
    }
  });
  Composite.add(world, mouseConstraint);
  render.canvas.style.pointerEvents = 'auto';
  container.style.pointerEvents = 'auto';

  Events.on(mouseConstraint, 'startdrag', (e) => {
    const b = e.body;
    if (b && b.isStatic) {
      Body.setStatic(b, false);
    }
    const s = shapes.find(x => x.body === b);
    if (s) s.released = true;
  });

  function sync() {
    for (const s of shapes) {
      const { x, y } = s.body.position;
      const a = s.body.angle;
      s.el.style.transform = `translate(${x - s.size/2}px, ${y - s.size/2}px) rotate(${a}rad)`;
    }
    requestAnimationFrame(sync);
  }
  sync();

  setTimeout(() => {
    const order = shapes.map((_, i) => i);
    order.sort(() => Math.random() - 0.5);
    order.forEach((idx, k) => {
      setTimeout(() => {
        const s = shapes[idx];
        if (!s.released && s.body.isStatic) {
          Body.setStatic(s.body, false);
          Body.setAngularVelocity(s.body, (Math.random() - 0.5) * 0.1);
          Body.applyForce(s.body, s.body.position, { x: (Math.random()-0.5)*0.02, y: 0 });
          s.released = true;
        }
      }, k * 150);
    });
  }, 500);

  window.addEventListener('resize', () => {
    render.canvas.width = W();
    render.canvas.height = H();
    render.options.width = W();
    render.options.height = H();
    
    Body.setPosition(ground, { x: W()/2, y: getGroundY() });
    Body.setPosition(rightWall, { x: W(), y: H()/2 });
    Body.setPosition(leftWall, { x: 0, y: H()/2 });
    Body.setPosition(ceiling, { x: W()/2, y: 0 });
  });
})();
</script>
</body>
</html>
